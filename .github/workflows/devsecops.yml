name: DevSecOps Scan
permissions:
  contents: read
  actions: read

on:
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/1.29.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

      - name: Start local lab
        run: |
          docker-compose up -d
          # Espera a que los servicios arranquen usando un enfoque más confiable
          until curl -s http://localhost:9000; do
            echo "Esperando que SonarQube esté listo..."
            sleep 5
          done

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.30.0
        with:
          scan-type: fs
          scan-ref: .

      - name: Run SonarQube scan
        run: |
          docker run --rm \
            --network=devsecops-lab_default \
            -e SONAR_HOST_URL="http://sonarqube:9000" \
            -e SONAR_LOGIN="${{ secrets.SONAR_TOKEN }}" \
            -v "$(pwd):/usr/src" \
            sonarsource/sonar-scanner-cli \
            -Dsonar.projectKey=myproject \
            -Dsonar.sources=.

      - name: Run ZAP DAST scan
        run: |
          docker run --rm \
            --network=devsecops-lab_default \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://juice-shop:3000 -r zap_report.html

      - name: Archive ZAP report
        uses: actions/upload-artifact@v4.6.2
        with:
          name: zap-report
          path: zap_report.html

      - name: Cleanup Docker
        run: |
          docker-compose down
