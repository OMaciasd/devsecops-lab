name: DevSecOps Scan
permissions:
  contents: read
  actions: read

on:
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Crear red Docker
        run: docker network create devsecops-lab || true

      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Docker Compose plugin
        run: sudo apt-get update && sudo apt-get install docker-compose-plugin

      - name: Start local lab
        run: |
          docker-compose up -d
          until curl -s http://localhost:9000; do
            echo "Esperando que SonarQube esté listo..."
            sleep 5
          done

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.30.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          ignore-unfixed: true

      - name: Run SonarQube scan
        run: |
          docker run --rm \
            --network=devsecops-lab_default \
            -e SONAR_HOST_URL="http://sonarqube:9000" \
            -e SONAR_LOGIN="${{ secrets.SONAR_TOKEN }}" \
            -v "$(pwd):/usr/src" \
            sonarsource/sonar-scanner-cli \
            -Dsonar.projectKey=myproject \
            -Dsonar.sources=.

      - name: Esperar que Juice Shop esté listo
        run: |
          until curl -s http://localhost:3000; do
            echo "Esperando que Juice Shop esté listo..."
            sleep 5
          done

      - name: Run ZAP DAST scan
        run: |
          docker run --rm \
            --network=devsecops-lab_default \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://juice-shop:3000 -r zap_report.html

      - name: Ensure docker-compose alias exists
        run: |
          if ! command -v docker-compose &> /dev/null; then
            sudo ln -s /usr/libexec/docker/cli-plugins/docker-compose /usr/local/bin/docker-compose || true
          fi

      - name: Archive ZAP report
        uses: actions/upload-artifact@v4.6.2
        with:
          name: zap-report
          path: zap_report.html

      - name: Cleanup Docker
        if: always()
        run: docker-compose down
