name: DevSecOps Scan
permissions:
  contents: read
  actions: read

on:
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Checkout del código del repositorio
      - name: Checkout repo
        uses: actions/checkout@v3

      # Paso 2: Verificar si ngrok está corriendo localmente
      - name: Verificar ngrok
        run: |
          if [ -z "$NGROK_URL" ]; then
            echo "NGROK_URL no está definido. No se puede continuar."
            exit 1
          fi
          echo "NGROK_URL está disponible: $NGROK_URL"

      # Paso 3: Ejecutar Trivy para el escaneo de seguridad
      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          ignore-unfixed: true

      # Paso 4: Ejecutar SonarQube scan
      - name: Run SonarQube scan
        run: |
          # Ejecutar sonar-scanner con la URL proporcionada por ngrok
          sonar-scanner \
            -Dsonar.projectKey=myproject \
            -Dsonar.sources=. \
            -Dsonar.host.url=http://${{ secrets.SONARQUBE_URL }} \
            -Dsonar.login="${{ secrets.SONAR_TOKEN }}"

      # Paso 5: Verificar si SonarQube está disponible
      - name: Verificar SonarQube
        run: |
          curl -s http://${{ secrets.SONARQUBE_URL }} | grep "SonarQube"
          echo "SonarQube está disponible y listo para escanear."

      # Paso 6: Esperar que la aplicación Juice Shop esté disponible para escanear
      - name: Esperar que Juice Shop esté listo
        run: |
          max_attempts=12
          attempt=0
          until curl -s http://localhost:3000 || [ $attempt -ge $max_attempts ]; do
            echo "Esperando que Juice Shop esté listo... Intento $attempt/$max_attempts"
            sleep 10
            attempt=$((attempt + 1))
          done
          if [ $attempt -ge $max_attempts ]; then
            echo "Juice Shop no está listo después de $max_attempts intentos. Fallando el pipeline."
            exit 1
          fi

      # Paso 7: Ejecutar escaneo DAST con ZAP (OWASP Zed Attack Proxy)
      - name: Run ZAP DAST scan
        run: |
          # Escaneo de seguridad con ZAP, directamente sobre Juice Shop
          zap-baseline.py -t http://juice-shop:3000 -r zap_report.html

      # Paso 8: Archivar el reporte de ZAP
      - name: Archive ZAP report
        uses: actions/upload-artifact@v4.6.2
        with:
          name: zap-report
          path: zap_report.html

      # Paso 9: Archivar los resultados del escaneo de SonarQube (si es necesario)
      - name: Archive SonarQube report
        uses: actions/upload-artifact@v4.6.2
        with:
          name: sonar-report
          path: sonar-report.json
